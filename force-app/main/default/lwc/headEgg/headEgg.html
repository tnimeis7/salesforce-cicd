<template>
    <template if:true={accounts}>
        <div class="slds-box slds-theme_default slds-p-around_medium">
            <h2 class="slds-text-heading_medium slds-m-bottom_medium slds-text-color_success">Account List</h2>
            <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-table_fixed-layout">
                <thead>
                    <tr class="slds-line-height_reset slds-theme_shade">
                        <th scope="col">
                            <div class="slds-truncate slds-text-color_error" title="ID">ID</div>
                        </th>
                        <th scope="col">
                            <div class="slds-truncate slds-text-color_success" title="Name">Name</div>
                        </th>
                    </tr>
                </thead>
                <tbody>
                    <template for:each={accounts} for:item="account">
                        <tr key={account.id} class="slds-hint-parent">
                            <td>
                                <div class="slds-truncate slds-text-color_weak" title={account.id}>{account.id}</div>
                            </td>
                            <td>
                                <span 
                                    class="slds-text-link slds-text-color_brand" 
                                    data-id={account.id} 
                                    onclick={handleAccountClick}>
                                    {account.name}
                                </span>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </template>
    <template if:true={error}>
        <div class="slds-box slds-theme_error slds-m-top_medium slds-p-around_medium">
            <p class="slds-text-heading_small slds-text-color_inverse">Error: {error.body.message}</p>
        </div>
    </template>
</template>
